const tabBar = document.getElementById('tabs');
const panesEl = document.getElementById('panes');

tabs.forEach((t,i) => {
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (i===0?' active':'');
  btn.textContent = t.label;
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.diagram-pane').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('pane-'+t.id).classList.add('active');
  };
  tabBar.appendChild(btn);

  const pane = document.createElement('div');
  pane.id = 'pane-'+t.id;
  pane.className = 'diagram-pane'+(i===0?' active':'');

  diagrams[t.id].forEach((d,j) => {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = d.label;
    pane.appendChild(lbl);

    const box = document.createElement('div');
    box.className = 'mermaid-box';
    const target = document.createElement('div');
    target.id = 'mermaid-'+t.id+'-'+j;
    box.appendChild(target);
    pane.appendChild(box);
  });

  panesEl.appendChild(pane);
});

async function renderAll() {
  for (const t of tabs) {
    for (let j = 0; j < diagrams[t.id].length; j++) {
      const el = document.getElementById('mermaid-'+t.id+'-'+j);
      if (el) {
        try {
          const {svg} = await mermaid.render('svg-'+t.id+'-'+j, diagrams[t.id][j].code);
          el.innerHTML = svg;
        } catch(e) {
          el.innerHTML = '<p style="color:var(--color-text-danger);font-size:13px">Render error: '+e.message+'</p>';
        }
      }
    }
  }
}
renderAll();
</script>
